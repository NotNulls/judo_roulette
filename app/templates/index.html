<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Judo Roulette - Random Technique Generator</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
   </head>
   <body>
      <!--    <div class="container">-->
      <!--        <h3>Welcome to TimerTimer, a simple timer</h3><br>-->

      <!--      Supports plain numbers and times ending with s, m, or h, e.g., 12 / 30s / 20m / 2h.-->

      <div class="container">
         <h1>🥋 Judo Roulette</h1>
         <p class="subtitle">Let fate choose your next technique!</p>
         <div class="filters">
            <div class="filter-group">
               <label>🎯 Technique Category:</label>
               <select id="category">
                  <option value="all">All Techniques</option>
                  <option value="ne-waza">Only Ne-Waza (Ground)</option>
                  <option value="tachi-waza">Only Tachi-Waza (Standing)</option>
               </select>
            </div>
            <div class="filter-group">
               <label>🥋 Belt Level (and below):</label>
               <select id="belt">
                  <option value="all">All Belts</option>
                  {% for belt in belts %}
                  <option value="{{ belt }}">{{ belt | capitalize }}</option>
                  {% endfor %}
               </select>
            </div>
            <button onclick="spinRoulette()">🎲 Spin the Roulette 🎲</button>
         </div>
         <div id="loading" class="loading">
            <p>🎯 Choosing technique...</p>
         </div>
         <div id="result" class="result">
            <div class="technique-name" id="techniqueName"></div>
            <div class="technique-details">
               <span id="techniqueCategory"></span>
               <span>Belt:
               <span id="techniqueBelt"></span>
               </span>
            </div>
         </div>
      </div>
      <!-- This closes the first container -->
      <div class="container">
         <form method="POST" action="{{ url_for('main.custom') }}" style="display:inline">
            <input name="time" class="time-input" placeholder="e.g. 12/30s/20m/2h">
            <input type="submit" class="startButton" value="START">
         </form>
         &nbsp;&nbsp;
         <a class="workButton" href="{{ url_for('main.minutes', num=25) }}">25 Minutes</a>
         <a class="restButton" href="{{ url_for('main.minutes', num=5) }}">5 Minutes</a>
         <a class="pomodoro" href="https://greyli.github.io/pomodoro" target="_blank">Pomodoro</a>
         <a class="helpButton" id="help-btn">?</a>
         {% for message in get_flashed_messages() %}
         <div class="alert-info">
            {{ message }}
         </div>
         {% endfor %}
      </div>
      <script>
         async function spinRoulette() {
             const category = document.getElementById('category').value;
             const belt = document.getElementById('belt').value;

             document.getElementById('loading').classList.add('show');
             document.getElementById('result').classList.remove('show');

             try {
                 const response = await fetch('/roulette', {
                     method: 'POST',
                     headers: {
                         'Content-Type': 'application/json',
                     },
                     body: JSON.stringify({ category: category, belt: belt })
                 });

                 if (!response.ok) {
                     throw new Error('No techniques found for these criteria');
                 }

                 const technique = await response.json();

                 document.getElementById('techniqueName').textContent = technique.name;
                 document.getElementById('techniqueCategory').textContent =
                     technique.category === 'ne-waza' ? 'Ground Technique' : 'Standing Technique';
                 document.getElementById('techniqueBelt').textContent =
                     technique.belt.charAt(0).toUpperCase() + technique.belt.slice(1);

                 document.getElementById('result').classList.add('show');
             } catch (error) {
                 alert(error.message);
             } finally {
                 document.getElementById('loading').classList.remove('show');
             }
         }

         document.addEventListener('keypress', function(e) {
             if (e.key === 'Enter') {
                 spinRoulette();
             }
         });
         // Complete belt color mapping function
         function applyBeltColor() {
         const beltSpan = document.getElementById('techniqueBelt');
         const beltText = beltSpan.textContent.toLowerCase().trim();

         // Color mapping for belts (white and black excluded)
         const beltColors = {
         'yellow': '#d4af37',
         'orange': '#ff8c00',
         'green': '#2e8b57',
         'blue': '#4169e1',
         'brown': '#8b4513',
         'red': '#dc143c'
         };

         // Reset to default (no color for white/black)
         beltSpan.style.color = '';
         beltSpan.style.fontWeight = '';

         // Apply color if belt is in the mapping
         if (beltColors[beltText]) {
         beltSpan.style.color = beltColors[beltText];
         beltSpan.style.fontWeight = 'bold';
         }
         }

         // Call this function after setting the belt text
         applyBeltColor();
      </script>
   </body>
</html>
